<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EightLimbs | Muay Thai Round Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* NEW COLORWAY: OBSIDIAN, CRIMSON, & CHALK */
            --bg-base: #0A0A0A;
            --surface: rgba(18, 18, 18, 0.95);
            --surface-elevated: rgba(30, 30, 30, 0.98);
            
            --accent-red: #B11226;
            --accent-red-bright: #D62839;
            --accent-red-glow: rgba(177, 18, 38, 0.3);
            
            --text-primary: #F5F5F5;
            --text-secondary: #999999;
            --border: rgba(255, 255, 255, 0.08);
            
            --transition-slow: all 0.9s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.2s ease;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000; /* True black for initial fade */
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* --- INITIAL FADE-IN FROM BLACK --- */
        #initial-fade-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            pointer-events: none;
            transition: opacity 1.2s ease-in-out;
        }

        /* --- BACKGROUND SYSTEM --- */
        .bg-layer-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            transition: var(--transition-slow);
        }

        /* Setup Screen: Vintage/Atmospheric */
        #img-setup { 
            z-index: 2; 
            opacity: 1; 
            filter: brightness(0.35) grayscale(0.5); 
        }

        /* Training Screen: New training page background.webp */
        #img-training { 
            z-index: 1; 
            opacity: 0; 
            filter: brightness(0.2) contrast(1.1); 
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(10, 10, 10, 0.2) 0%, #000 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* --- UI LAYOUT --- */
        .app-shell {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }
        .logo span { color: var(--accent-red); }

        .panel {
            background: var(--surface);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .section-header {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-red);
            margin-bottom: 12px;
            display: block;
        }

        /* --- CONFIG FORM --- */
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-label { font-size: 0.65rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }

        select {
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus { border-color: var(--accent-red); }

        .weapon-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .weapon-trigger {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .weapon-trigger:hover { color: var(--accent-red); }

        .weapon-list {
            display: none;
            padding: 15px 20px;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.4);
        }
        .weapon-list.active { display: grid; }

        .check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .check-item input { accent-color: var(--accent-red); }

        /* --- TRAINING HUD --- */
        #training-hud { display: none; text-align: center; width: 100%; max-width: 600px; }

        .timer-val {
            font-size: 9rem;
            font-weight: 200;
            line-height: 1;
            margin: 5px 0;
            letter-spacing: -6px;
            font-variant-numeric: tabular-nums;
            color: var(--text-primary);
        }

        .pill-badge {
            display: inline-block;
            padding: 6px 24px;
            border-radius: 100px;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .combo-stage {
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px 0;
        }

        #combo-display {
            font-size: 3.2rem;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.1;
            letter-spacing: -1px;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(177, 18, 38, 0.4);
        }

        /* --- BUTTONS --- */
        .btn {
            width: 100%;
            padding: 20px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .btn-red { 
            background: var(--accent-red); 
            color: #fff; 
            box-shadow: 0 10px 30px var(--accent-red-glow); 
        }
        .btn-red:hover { 
            background: var(--accent-red-bright); 
            transform: translateY(-2px); 
            box-shadow: 0 15px 40px var(--accent-red-glow); 
        }
        
        .btn-sec { 
            background: transparent; 
            color: var(--text-secondary); 
            border: 1px solid var(--border); 
            margin-top: 12px; 
        }
        .btn-sec:hover { 
            background: rgba(255,255,255,0.05); 
            color: #fff; 
            border-color: var(--accent-red);
        }

        .hud-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

        .audio-btn {
            position: fixed;
            bottom: 30px; right: 30px;
            background: var(--surface);
            border: 1px solid var(--border);
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0.4; z-index: 100; font-size: 1.2rem;
            transition: opacity 0.3s;
        }
        .audio-btn:hover { opacity: 1; border-color: var(--accent-red); }

        /* --- STATES --- */
        .is-rest .pill-badge { border-color: var(--text-secondary); color: var(--text-secondary); }
        .is-rest .timer-val { color: var(--text-secondary); opacity: 0.3; }

    </style>
</head>
<body onload="document.getElementById('initial-fade-overlay').style.opacity = '0';">

    <div id="initial-fade-overlay"></div>

    <div class="bg-layer-container">
        <img id="img-setup" src="landing page background.jpg" class="bg-img" alt="">
        <img id="img-training" src="training page background.webp" class="bg-img" alt="">
        <div class="bg-overlay"></div>
    </div>

    <div class="app-shell">
        <div class="logo">Eight<span>Limbs</span></div>

        <div id="setup-panel" class="panel">
            <span class="section-header">Protocol Settings</span>
            
            <div class="config-grid">
                <div class="input-group">
                    <span class="input-label">Rounds</span>
                    <select id="rounds">
                        <option value="2">2 Rounds</option><option value="3" selected>3 Rounds</option>
                        <option value="4">4 Rounds</option><option value="5">5 Rounds</option>
                        <option value="6">6 Rounds</option><option value="7">7 Rounds</option>
                        <option value="8">8 Rounds</option>
                    </select>
                </div>
                <div class="input-group">
                    <span class="input-label">Round Time</span>
                    <select id="work-time">
                        <option value="120">2:00</option><option value="180" selected>3:00</option>
                        <option value="240">4:00</option>
                    </select>
                </div>
            </div>

            <div class="config-grid">
                <div class="input-group">
                    <span class="input-label">Rest Time</span>
                    <select id="rest-time">
                        <option value="30">0:30</option><option value="60" selected>1:00</option>
                    </select>
                </div>
                <div class="input-group">
                    <span class="input-label">Combo Interval</span>
                    <select id="combo-interval">
                        <option value="3">3 Seconds</option><option value="5" selected>5 Seconds</option>
                        <option value="7">7 Seconds</option><option value="10">10 Seconds</option>
                    </select>
                </div>
            </div>

            <span class="section-header">Weapon Systems</span>
            
            <div class="weapon-card">
                <div class="weapon-trigger" onclick="toggleWeapons(this)">Upper Body <span id="count-punches">3</span></div>
                <div class="weapon-list" data-cat="punches">
                    <label class="check-item"><input type="checkbox" value="1" checked> 1 (Jab)</label>
                    <label class="check-item"><input type="checkbox" value="2" checked> 2 (Cross)</label>
                    <label class="check-item"><input type="checkbox" value="3" checked> 3 (L-Hook)</label>
                    <label class="check-item"><input type="checkbox" value="4"> 4 (R-Hook)</label>
                    <label class="check-item"><input type="checkbox" value="5"> 5 (L-Uppercut)</label>
                    <label class="check-item"><input type="checkbox" value="6"> 6 (R-Uppercut)</label>
                    <label class="check-item"><input type="checkbox" value="Elbows"> Elbows</label>
                </div>
            </div>

            <div class="weapon-card">
                <div class="weapon-trigger" onclick="toggleWeapons(this)">Kicks & Knees <span id="count-kicks">4</span></div>
                <div class="weapon-list" data-cat="kicks">
                    <label class="check-item"><input type="checkbox" value="Lead Teep" checked> Lead Teep</label>
                    <label class="check-item"><input type="checkbox" value="Rear Teep" checked> Rear Teep</label>
                    <label class="check-item"><input type="checkbox" value="Lead Roundhouse" checked> Lead Round</label>
                    <label class="check-item"><input type="checkbox" value="Rear Roundhouse" checked> Rear Round</label>
                    <label class="check-item"><input type="checkbox" value="Lead Low Kick"> Lead Low</label>
                    <label class="check-item"><input type="checkbox" value="Rear Low Kick"> Rear Low</label>
                    <label class="check-item"><input type="checkbox" value="Lead Knee"> Lead Knee</label>
                    <label class="check-item"><input type="checkbox" value="Rear Knee"> Rear Knee</label>
                </div>
            </div>

            <div class="weapon-card">
                <div class="weapon-trigger" onclick="toggleWeapons(this)">Defense <span id="count-defense">1</span></div>
                <div class="weapon-list" data-cat="defense">
                    <label class="check-item"><input type="checkbox" value="Check" checked> Check</label>
                    <label class="check-item"><input type="checkbox" value="Feint"> Feint</label>
                </div>
            </div>

            <button class="btn btn-red" onclick="initSession()">Enter the Ring</button>
        </div>

        <div id="training-hud">
            <div id="phase-badge" class="pill-badge">Work</div>
            <div id="timer-display" class="timer-val">00:00</div>
            <div id="round-label" class="section-header">Round 1 / 3</div>

            <div class="combo-stage">
                <div id="combo-display">STANDBY</div>
            </div>

            <div class="hud-actions">
                <button id="pause-btn" class="btn btn-sec" onclick="togglePause()">Pause</button>
                <button class="btn btn-sec" onclick="location.reload()">End Session</button>
            </div>
        </div>
    </div>

    <div class="audio-btn" onclick="toggleMute()">🔊</div>
    <audio id="ambience-fx" loop src="muay thai fight ambiance.mp3"></audio>

<script>
/**
 * --- ENGINE DATA ---
 */
const SPEECH_GUIDE = {
    "1": "One", "2": "Two", "3": "Three", "4": "Four", "5": "Five", "6": "Six",
    "Lead Teep": "Front Teep", "Rear Teep": "Rear Teep",
    "Lead Roundhouse": "Lead Roundhouse", "Rear Roundhouse": "Rear Roundhouse",
    "Lead Low Kick": "Lead Low Kick", "Rear Low Kick": "Rear Low Kick",
    "Lead Knee": "Lead Knee", "Rear Knee": "Rear Knee"
};

const COMBO_LOGIC = [
    ['punches', 'punches'], ['punches', 'punches', 'kicks'],
    ['defense', 'punches'], ['defense', 'punches', 'kicks'],
    ['kicks', 'punches'], ['punches', 'kicks'],
    ['punches', 'punches', 'punches'], ['punches', 'kicks', 'punches']
];

let timerRef, comboRef, timeLeft, currentRound = 1, totalRounds;
let isResting = false, isPaused = false, lastComboStr = "";
const audioTrack = document.getElementById('ambience-fx');

/**
 * --- VOICE ENGINE ---
 */
function getEliteVoice() {
    const voices = window.speechSynthesis.getVoices();
    const rank = (v) => {
        let s = 0;
        const n = v.name.toLowerCase();
        if (!v.lang.startsWith('en')) return -100;
        if (n.includes('google') && n.includes('uk') && n.includes('male')) s += 100;
        if (n.includes('alex') || n.includes('daniel')) s += 90;
        if (n.includes('natural') || n.includes('enhanced')) s += 50;
        if (n.includes('male')) s += 30;
        return s;
    };
    return voices.sort((a, b) => rank(b) - rank(a))[0];
}

function coachCallout(text) {
    window.speechSynthesis.cancel();
    const spoken = text.split(', ').map(s => SPEECH_GUIDE[s] || s).join(', ');
    const msg = new SpeechSynthesisUtterance(spoken);
    msg.voice = getEliteVoice();
    msg.rate = 1.05; msg.pitch = 0.95;
    window.speechSynthesis.speak(msg);
}

/**
 * --- UI LOGIC ---
 */
function toggleWeapons(el) {
    const list = el.nextElementSibling;
    const isAct = list.classList.contains('active');
    document.querySelectorAll('.weapon-list').forEach(l => l.classList.remove('active'));
    if (!isAct) list.classList.add('active');
}

function updateCounts() {
    document.querySelectorAll('.weapon-list').forEach(cat => {
        const count = cat.querySelectorAll('input:checked').length;
        document.getElementById(`count-${cat.dataset.cat}`).textContent = count;
    });
}
document.querySelectorAll('input[type="checkbox"]').forEach(i => i.onchange = updateCounts);
updateCounts();

/**
 * --- SESSION FLOW ---
 */
function initSession() {
    totalRounds = parseInt(document.getElementById('rounds').value);
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('training-hud').style.display = 'block';
    
    // Background Swap Logic
    document.getElementById('img-setup').style.opacity = '0';
    document.getElementById('img-training').style.opacity = '1';

    audioTrack.volume = 0.12;
    audioTrack.play().catch(e => console.log("Audio blocked: ", e));

    startPhase('work');
}

function startPhase(phase) {
    isResting = (phase === 'rest');
    timeLeft = isResting ? parseInt(document.getElementById('rest-time').value) : parseInt(document.getElementById('work-time').value);
    
    const badge = document.getElementById('phase-badge');
    const hud = document.getElementById('training-hud');

    if (isResting) {
        hud.classList.add('is-rest');
        badge.textContent = "Rest";
        document.getElementById('combo-display').textContent = "RECOVER";
        coachCallout("Rest.");
        clearInterval(comboRef);
    } else {
        hud.classList.remove('is-rest');
        badge.textContent = "Work";
        coachCallout(`Round ${currentRound}. Box!`);
        startCombos();
    }
    
    updateDisplay();
    timerRef = setInterval(tick, 1000);
}

function tick() {
    if (isPaused) return;
    timeLeft--;
    updateDisplay();

    if (timeLeft <= 0) {
        clearInterval(timerRef);
        if (!isResting) {
            if (currentRound >= totalRounds) endWorkout();
            else startPhase('rest');
        } else {
            currentRound++;
            startPhase('work');
        }
    }
}

function startCombos() {
    const sec = parseInt(document.getElementById('combo-interval').value) * 1000;
    const trigger = () => {
        const combo = buildCombo();
        document.getElementById('combo-display').textContent = combo;
        coachCallout(combo);
    };
    trigger();
    comboRef = setInterval(trigger, sec);
}

function buildCombo() {
    const getP = (cat) => Array.from(document.querySelector(`[data-cat="${cat}"]`).querySelectorAll('input:checked')).map(i => i.value);
    const pools = { punches: getP('punches'), kicks: getP('kicks'), defense: getP('defense') };
    const validTemplates = COMBO_LOGIC.filter(t => t.every(cat => pools[cat].length > 0));
    const template = validTemplates[Math.floor(Math.random() * validTemplates.length)];
    let combo = [];
    template.forEach(cat => combo.push(pools[cat][Math.floor(Math.random() * pools[cat].length)]));
    const str = combo.join(', ');
    if (str === lastComboStr && (pools.punches.length + pools.kicks.length > 2)) return buildCombo();
    lastComboStr = str;
    return str;
}

function updateDisplay() {
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timer-display').textContent = `${m}:${s.toString().padStart(2, '0')}`;
    document.getElementById('round-label').textContent = `Round ${currentRound} / ${totalRounds}`;
}

function togglePause() {
    isPaused = !isPaused;
    document.getElementById('pause-btn').textContent = isPaused ? "Resume" : "Pause";
    if (isPaused) { window.speechSynthesis.pause(); audioTrack.pause(); }
    else { window.speechSynthesis.resume(); audioTrack.play(); }
}

function toggleMute() { audioTrack.muted = !audioTrack.muted; }

function endWorkout() {
    clearInterval(comboRef);
    document.getElementById('phase-badge').textContent = "Elite";
    document.getElementById('combo-display').textContent = "CHAMPION";
    coachCallout("Workout complete.");
    audioTrack.pause();
}

window.speechSynthesis.getVoices();
</script>
</body>
</html>
